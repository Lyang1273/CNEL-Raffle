name: Raffle Draw

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "开奖模式"
        required: true
        type: choice
        options:
          - contributors
          - normal
      pool_one_file:
        description: "奖池一名单文件"
        required: false
        type: string
        default: ".github/raffle/pool-1.txt"
      pool_two_file:
        description: "奖池二名单文件"
        required: false
        type: string
        default: ".github/raffle/pool-2.txt"
      winners:
        description: "中奖人数"
        required: false
        default: "10"
        type: string
  schedule:
    - cron: "0 7 17 7 *"
    - cron: "0 9 17 7 *"

permissions:
  contents: write

jobs:
  draw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Draw winners
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          MODE_INPUT: ${{ github.event.inputs.mode || '' }}
          POOL_ONE_FILE: ${{ github.event.inputs.pool_one_file || '.github/raffle/pool-1.txt' }}
          POOL_TWO_FILE: ${{ github.event.inputs.pool_two_file || '.github/raffle/pool-2.txt' }}
          WINNERS: ${{ github.event.inputs.winners || '10' }}
          SCHEDULE_CRON: ${{ github.event.schedule || '' }}
          OUTPUT_DIR: results
        run: node .github/scripts/draw-raffle.js

      - name: Commit results
        run: |
          if git diff --quiet -- results; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results
          git commit -m "chore: publish raffle result"
          git push origin HEAD:${GITHUB_REF_NAME}
