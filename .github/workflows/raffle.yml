name: Raffle Draw

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 24 7 *"

permissions:
  contents: write

jobs:
  draw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Draw winners
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          POOL_FILE: .github/raffle/pool.txt
          WINNERS: 25
          OUTPUT_DIR: results
          OUTPUT_README: README.md
        run: node .github/scripts/draw-raffle.js

      - name: Commit results
        run: |
          if git diff --quiet -- results README.md; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results README.md
          git commit -m "chore: publish raffle result"
          git push origin HEAD:${GITHUB_REF_NAME}
